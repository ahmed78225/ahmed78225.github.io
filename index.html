<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Ahmed Drive Pro</title>

<style>
:root{
  --bg1:#0f172a;
  --bg2:#1e3a8a;
  --bg3:#2563eb;
  --text:#fff;
  --card:rgba(255,255,255,0.06);
}

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
  color:var(--text);
}

/* صفحة الدخول */
#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  gap:10px;
}

input{
  padding:10px;
  width:250px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* التطبيق */
#app{
  display:none;
  padding:20px;
}

/* رفع */
.upload{
  text-align:center;
  margin-bottom:20px;
}

/* ملفات */
.card{
  background:white;
  color:black;
  padding:15px;
  margin:10px auto;
  width:90%;
  max-width:600px;
  border-radius:12px;
}

.download{
  display:block;
  margin-top:10px;
  background:#2563eb;
  color:white;
  text-align:center;
  padding:10px;
  border-radius:8px;
  text-decoration:none;
}

.delete{
  margin-top:10px;
  background:red;
  color:white;
}
</style>
</head>

<body>

<!-- تسجيل -->
<div id="login">
  <h2>تسجيل الدخول</h2>
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">دخول</button>
</div>

<!-- التطبيق -->
<div id="app">

<div class="upload">
  <input type="file" id="file">
  <input type="text" id="desc" placeholder="وصف الملف">
  <button onclick="upload()">رفع</button>
  <button onclick="logout()">خروج</button>
</div>

<div id="list"></div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://mvfydfodqyvfdzzapckf.supabase.co",
  "sb_publishable_QFwdX1L2pneeEFEqXNpbRw_9vJ71a1e"
);

// 👑 أنت الأدمن
const ADMIN_EMAIL = "ahmed.aa7822@gmail.com";

let user = null;

/* تسجيل دخول */
window.login = async function(){

  let email = document.getElementById("email").value;
  let pass = document.getElementById("pass").value;

  let { data, error } = await supabase.auth.signInWithPassword({
    email,
    password: pass
  });

  if(data.user){

    user = data.user;

    // 🔐 منع غير الأدمن
    if(user.email !== ADMIN_EMAIL){
      alert("هذا الموقع للأدمن فقط");
      await supabase.auth.signOut();
      location.reload();
      return;
    }

    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";

    load();

  } else {
    alert("خطأ في تسجيل الدخول");
  }
};

/* خروج */
window.logout = async function(){
  await supabase.auth.signOut();
  location.reload();
};

/* رفع */
window.upload = async function(){

  let file = document.getElementById("file").files[0];
  let desc = document.getElementById("desc").value;

  if(!file) return alert("اختر ملف");

  let name = Date.now() + "_" + file.name;

  await supabase.storage.from("files").upload(name, file);

  await supabase.from("file_meta").insert([
    {
      name: name,
      desc: desc,
      owner: user.id
    }
  ]);

  load();
};

/* حذف (للأدمن فقط) */
window.removeFile = async function(name){

  if(user.email !== ADMIN_EMAIL) return;

  await supabase.storage.from("files").remove([name]);
  await supabase.from("file_meta").delete().eq("name", name);

  load();
};

/* عرض الملفات */
async function load(){

  let { data: files } = await supabase.storage.from("files").list();
  let { data: meta } = await supabase.from("file_meta").select("*");

  let box = document.getElementById("list");
  box.innerHTML = "";

  files.forEach(f => {

    let url = supabase.storage.from("files")
    .getPublicUrl(f.name).data.publicUrl;

    let m = meta?.find(x => x.name === f.name);

    box.innerHTML += `
      <div class="card">
        <h3>${f.name}</h3>
        <p>${m ? m.desc : "بدون وصف"}</p>

        <a class="download" href="${url}" download>
          تحميل
        </a>

        <button class="delete" onclick="removeFile('${f.name}')">
          حذف
        </button>

      </div>
    `;
  });
}

</script>

</body>
</html>
