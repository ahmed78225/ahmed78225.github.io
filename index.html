<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام الملفات</title>

<style>
body {
  margin:0;
  font-family: Arial;
  transition: 0.3s;
}

/* الوضع الليلي والنهاري */
:root {
  --bg:#0f0f0f;
  --card:#1e1e1e;
  --text:white;
}

.light {
  --bg:#f2f2f2;
  --card:white;
  --text:black;
}

body {
  background:var(--bg);
  color:var(--text);
}

/* صفحة الدخول */
#login {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* زر الدخول */
#enterBtn {
  font-size:18px;
}

/* القائمة */
#app {
  display:none;
}

/* الهيدر */
.header {
  display:flex;
  justify-content:space-between;
  padding:10px;
}

/* قائمة 3 خطوط */
.menu {
  position:absolute;
  top:10px;
  right:10px;
  cursor:pointer;
}

/* القائمة الجانبية */
.side {
  position:fixed;
  right:0;
  top:0;
  width:200px;
  height:100%;
  background:#333;
  display:none;
  padding:10px;
}

/* الملفات */
.card {
  background:var(--card);
  margin:10px;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- صفحة الدخول -->
<div id="login">
  <button id="enterBtn" onclick="enter()">دخول</button>
</div>

<!-- التطبيق -->
<div id="app">

<div class="header">
  <div onclick="toggleMenu()">☰</div>
  <div onclick="toggleTheme()">تبديل الوضع</div>
</div>

<!-- القائمة الجانبية (للأدمن) -->
<div class="side" id="side">
  <h4>الإعدادات</h4>
  <input type="password" id="code" placeholder="كلمة السر">
  <button onclick="check()">تسجيل الدخول</button>

  <div id="admin" style="display:none;">
    <input type="file" id="file">
    <input type="text" id="desc" placeholder="وصف الملف">
    <button onclick="upload()">رفع</button>
  </div>
</div>

<!-- الملفات -->
<div id="files"></div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
"https://mvfydfodqyvfdzzapckf.supabase.co",
"sb_publishable_QFwdX1L2pneeEFEqXNpbRw_9vJ71a1e"
);

// دخول
window.enter = function(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  loadFiles();
};

// الوضع
window.toggleTheme = function(){
  document.body.classList.toggle("light");
};

// القائمة
window.toggleMenu = function(){
  let s = document.getElementById("side");
  s.style.display = s.style.display=="block"?"none":"block";
};

// كود أدمن
window.check = function(){
  if(document.getElementById("code").value=="12345"){
    document.getElementById("admin").style.display="block";
    alert("تم الدخول للأدمن");
  }
};

// رفع
window.upload = async function(){
  let file = document.getElementById("file").files[0];
  let desc = document.getElementById("desc").value;

  let name = Date.now()+"_"+file.name;

  await supabase.storage.from("files").upload(name,file);

  localStorage.setItem(name,desc);

  loadFiles();
};

// عرض الملفات
async function loadFiles(){
  let {data}=await supabase.storage.from("files").list();

  let box=document.getElementById("files");
  box.innerHTML="";

  data.forEach(f=>{

    let url=supabase.storage.from("files").getPublicUrl(f.name).data.publicUrl;
    let desc=localStorage.getItem(f.name)||"بدون وصف";

    box.innerHTML+=`
    <div class="card">
      <b>${f.name}</b><br>
      <small>${desc}</small><br>
      <a href="${url}" download>تحميل</a>
    </div>
    `;
  });
}

</script>

</body>
</html>
