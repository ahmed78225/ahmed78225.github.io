<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Ahmed Hacker Drive</title>

<style>
:root{
  --bg:#000;
  --card:#0a0a0a;
  --text:#00ff88;
  --accent:#00ff88;
}

body{
  margin:0;
  font-family: monospace;
  background:var(--bg);
  color:var(--text);
}

/* شاشة الدخول */
#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

h1{
  letter-spacing:2px;
  font-size:26px;
}

/* زر دخول */
button{
  background:transparent;
  border:1px solid var(--accent);
  color:var(--accent);
  padding:10px 20px;
  cursor:pointer;
  margin-top:10px;
}

button:hover{
  background:var(--accent);
  color:black;
}

/* الهيدر */
.header{
  text-align:center;
  padding:20px;
}

.title{
  font-size:30px;
  text-shadow:0 0 10px var(--accent);
}

/* قائمة هاكر */
.menu{
  position:fixed;
  top:10px;
  right:10px;
  font-size:22px;
  cursor:pointer;
}

/* side panel */
.side{
  position:fixed;
  right:0;
  top:0;
  width:220px;
  height:100%;
  background:#050505;
  border-left:1px solid var(--accent);
  display:none;
  padding:10px;
}

/* كروت */
.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  padding:10px;
}

.card{
  width:90%;
  max-width:500px;
  background:var(--card);
  border:1px solid var(--accent);
  padding:12px;
  text-align:center;
}

/* زر تحميل */
.download{
  display:block;
  margin-top:10px;
  padding:10px;
  border:1px solid var(--accent);
  color:var(--accent);
  text-decoration:none;
}

.download:hover{
  background:var(--accent);
  color:black;
}
</style>
</head>

<body>

<!-- دخول -->
<div id="login">
  <h1>ACCESS SYSTEM</h1>
  <button onclick="enter()">ENTER</button>
</div>

<!-- النظام -->
<div id="app" style="display:none;">

<div class="menu" onclick="toggle()">☰</div>

<div class="header">
  <div class="title">AHMED RADFAN SYSTEM</div>
</div>

<!-- لوحة الأدمن -->
<div class="side" id="side">

<h3>CONTROL PANEL</h3>

<input type="password" id="code" placeholder="ACCESS CODE">
<button onclick="check()">LOGIN</button>

<div id="admin" style="display:none;">
  <input type="file" id="file"><br><br>
  <input type="text" id="desc" placeholder="FILE DESCRIPTION"><br><br>
  <button onclick="upload()">UPLOAD</button>
</div>

</div>

<!-- الملفات -->
<div class="container" id="list"></div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
"https://mvfydfodqyvfdzzapckf.supabase.co",
"sb_publishable_QFwdX1L2pneeEFEqXNpbRw_9vJ71a1e"
);

// دخول
window.enter=function(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  load();
};

// قائمة
window.toggle=function(){
  let s=document.getElementById("side");
  s.style.display=s.style.display=="block"?"none":"block";
};

// كود
window.check=function(){
  if(document.getElementById("code").value=="12345"){
    document.getElementById("admin").style.display="block";
  }
};

// رفع
window.upload=async function(){
  let file=document.getElementById("file").files[0];
  let desc=document.getElementById("desc").value;

  let name=Date.now()+"_"+file.name;

  await supabase.storage.from("files").upload(name,file);

  localStorage.setItem(name,desc);

  load();
};

// عرض
async function load(){
  let {data}=await supabase.storage.from("files").list();

  let box=document.getElementById("list");
  box.innerHTML="";

  data.forEach(f=>{

    let url=supabase.storage.from("files")
    .getPublicUrl(f.name).data.publicUrl;

    let desc=localStorage.getItem(f.name)||"NO DESCRIPTION";

    box.innerHTML+=`
      <div class="card">
        <div>${f.name}</div>
        <small>${desc}</small>
        <a class="download" href="${url}" download>
          DOWNLOAD
        </a>
      </div>
    `;
  });
}

</script>

</body>
</html>
