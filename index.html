<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>رفع الملفات</title>
</head>
<body>

<h2>📤 رفع ملف</h2>

<input type="file" id="file">
<button onclick="upload()">رفع</button>

<h3>📄 الملفات</h3>
<div id="list"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getStorage, ref, uploadBytes, getDownloadURL, listAll } 
  from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBuK8yE3rDaS6tLmFweltp7JZqtK1pq2nU",
    authDomain: "vip-radfan.firebaseapp.com",
    projectId: "vip-radfan",
    storageBucket: "vip-radfan.appspot.com",
    messagingSenderId: "244514768232",
    appId: "1:244514768232:web:cb3e831608d2785f1e82dd"
  };

  const app = initializeApp(firebaseConfig);
  const storage = getStorage(app);

  // رفع ملف
  window.upload = async function () {
    const file = document.getElementById("file").files[0];
    if (!file) return alert("اختر ملف");

    const fileRef = ref(storage, file.name);
    await uploadBytes(fileRef, file);

    const url = await getDownloadURL(fileRef);

    document.getElementById("list").innerHTML += `
      <p><a href="${url}" target="_blank">⬇ ${file.name}</a></p>
    `;
  }

  // عرض الملفات
  async function loadFiles() {
    const listRef = ref(storage, "/");
    const res = await listAll(listRef);

    res.items.forEach(async (item) => {
      const url = await getDownloadURL(item);

      document.getElementById("list").innerHTML += `
        <p><a href="${url}" target="_blank">⬇ ${item.name}</a></p>
      `;
    });
  }

  loadFiles();
</script>

</body>
</html>
