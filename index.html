<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>VIP Drive</title>

<style>
body {
  font-family: sans-serif;
  background: linear-gradient(135deg,#111,#333);
  color: white;
  text-align: center;
  padding: 40px;
}

.card {
  background: #222;
  padding: 15px;
  margin: 10px auto;
  width: 90%;
  max-width: 450px;
  border-radius: 12px;
  text-align: right;
}

button {
  padding: 10px 15px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.startBtn {
  background: #00c853;
  color: white;
  font-size: 18px;
}

.fileBtn {
  background: #2962ff;
  color: white;
}

#uploadBox {
  display: none;
  margin-top: 20px;
}
textarea, input {
  width: 90%;
  padding: 8px;
  margin-top: 5px;
  border-radius: 8px;
}
</style>
</head>

<body>

<h1>📁 VIP DRIVE</h1>

<!-- البداية -->
<div id="home">
  <button class="startBtn" onclick="openApp()">🚀 ابدأ</button>
</div>

<!-- التطبيق -->
<div id="app" style="display:none;">

<h2>📂 الملفات</h2>

<!-- كود سري -->
<input type="password" id="secret" placeholder="كلمة السر">
<button onclick="check()">دخول الرفع</button>

<!-- رفع -->
<div id="uploadBox">

  <input type="file" id="file">

  <textarea id="desc" placeholder="اكتب وصف الملف (سطر أو سطرين)"></textarea>

  <button onclick="uploadFile()">رفع الملف</button>

</div>

<!-- عرض الملفات -->
<div id="list"></div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabaseUrl = "https://mvfydfodqyvfdzzapckf.supabase.co";
const supabaseKey = "sb_publishable_QFwdX1L2pneeEFEqXNpbRw_9vJ71a1e";

const supabase = createClient(supabaseUrl, supabaseKey);

// فتح التطبيق
window.openApp = function () {
  document.getElementById("home").style.display = "none";
  document.getElementById("app").style.display = "block";
  loadFiles();
};

// كود سري
window.check = function () {
  const code = document.getElementById("secret").value;

  if (code === "12345") {
    document.getElementById("uploadBox").style.display = "block";
    alert("تم السماح بالرفع 🔓");
  } else {
    alert("كلمة سر خطأ ❌");
  }
};

// رفع ملف مع وصف
window.uploadFile = async function () {
  const file = document.getElementById("file").files[0];
  const desc = document.getElementById("desc").value;

  if (!file) return alert("اختر ملف");

  const fileName = Date.now() + "_" + file.name;

  const { error } = await supabase.storage
    .from("files")
    .upload(fileName, file);

  if (error) return alert("فشل الرفع");

  // نحفظ الوصف داخل اسم الملف (حل بسيط بدون DB)
  localStorage.setItem(fileName, desc);

  loadFiles();
};

// عرض الملفات
async function loadFiles() {
  const { data } = await supabase.storage.from("files").list();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(file => {

    const url = supabase.storage.from("files")
      .getPublicUrl(file.name).data.publicUrl;

    const type = file.name.split('.').pop();
    const desc = localStorage.getItem(file.name) || "بدون وصف";

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      📄 ${file.name}<br>
      🧩 النوع: ${type}<br>
      📝 ${desc}<br>

      <a href="${url}" download="${file.name}">
        <button class="fileBtn">🚀 ابدأ التحميل</button>
      </a>
    `;

    list.appendChild(div);
  });
}

</script>

</body>
</html>
