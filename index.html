<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>أحمد الردفاني - Drive</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#eef2ff;
  color:#111;
}

/* دخول */
#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:linear-gradient(135deg,#2563eb,#1e3a8a);
  color:white;
}

#enterBtn{
  padding:16px 55px;
  font-size:18px;
  border:none;
  border-radius:14px;
  background:white;
  color:#2563eb;
  font-weight:bold;
  cursor:pointer;
}

/* هيدر */
.header{
  text-align:center;
  padding:25px;
  background:white;
  box-shadow:0 3px 12px rgba(0,0,0,0.08);
}

.title{
  font-size:40px;
  font-weight:bold;
}

.sub{
  color:#666;
}

/* قائمة */
.menu{
  position:fixed;
  top:15px;
  right:15px;
  font-size:30px;
  cursor:pointer;
}

/* لوحة الأدمن */
.side{
  position:fixed;
  right:0;
  top:0;
  width:270px;
  height:100%;
  background:#0f172a;
  color:white;
  padding:15px;
  display:none;
}

/* ملفات */
.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
  padding:20px;
}

/* كرت */
.card{
  width:92%;
  max-width:700px;
  background:white;
  padding:22px;
  border-radius:16px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  text-align:center;
}

/* زر تحميل ضخم */
.download{
  display:block;
  margin-top:15px;
  padding:18px;
  font-size:18px;
  background:#2563eb;
  color:white;
  border-radius:14px;
  text-decoration:none;
  font-weight:bold;
}

.download:hover{
  background:#1e3a8a;
}

/* زر حذف */
.delete{
  margin-top:10px;
  padding:10px 15px;
  background:#ef4444;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- دخول -->
<div id="login">
  <h1>مرحباً بك في Ahmed Drive</h1>
  <button id="enterBtn" onclick="enter()">ابدأ</button>
</div>

<!-- التطبيق -->
<div id="app" style="display:none;">

<div class="menu" onclick="toggle()">☰</div>

<div class="header">
  <div class="title">أحمد الردفاني</div>
  <div class="sub">نظام رفع وتحميل الملفات الاحترافي</div>
</div>

<!-- الأدمن -->
<div class="side" id="side">

<h3>لوحة التحكم</h3>

<input type="password" id="code" placeholder="كلمة المرور"><br><br>
<button onclick="check()">دخول</button>

<div id="admin" style="display:none;margin-top:15px;">
  <input type="file" id="file"><br><br>
  <input type="text" id="desc" placeholder="وصف الملف"><br><br>
  <button onclick="upload()">رفع ملف</button>
</div>

</div>

<!-- الملفات -->
<div class="container" id="list"></div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
"https://mvfydfodqyvfdzzapckf.supabase.co",
"sb_publishable_QFwdX1L2pneeEFEqXNpbRw_9vJ71a1e"
);

// دخول
window.enter=function(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  load();
};

// قائمة
window.toggle=function(){
  let s=document.getElementById("side");
  s.style.display=s.style.display=="block"?"none":"block";
};

// دخول الأدمن
window.check=function(){
  if(document.getElementById("code").value=="12345"){
    document.getElementById("admin").style.display="block";
    alert("تم تسجيل الدخول");
  }
};

// رفع
window.upload=async function(){
  let file=document.getElementById("file").files[0];
  let desc=document.getElementById("desc").value;

  let name=Date.now()+"_"+file.name;

  await supabase.storage.from("files").upload(name,file);

  await supabase.from("file_meta").insert([
    {name:name, desc:desc}
  ]);

  load();
};

// حذف
window.removeFile=async function(name){
  await supabase.storage.from("files").remove([name]);
  await supabase.from("file_meta").delete().eq("name",name);
  load();
};

// عرض الملفات
async function load(){

  let {data:files}=await supabase.storage.from("files").list();
  let {data:meta}=await supabase.from("file_meta").select("*");

  let box=document.getElementById("list");
  box.innerHTML="";

  files.forEach(f=>{

    let url=supabase.storage.from("files")
    .getPublicUrl(f.name).data.publicUrl;

    let m=meta?.find(x=>x.name==f.name);
    let desc=m?m.desc:"لا يوجد وصف";

    let type=f.name.split('.').pop();

    box.innerHTML+=`
      <div class="card">
        <h2>${f.name}</h2>
        <div>نوع الملف: ${type}</div>
        <p>${desc}</p>

        <a class="download" href="${url}" download>
          ابدأ التحميل
        </a>

        <button class="delete" onclick="removeFile('${f.name}')">
          حذف (أدمن)
        </button>
      </div>
    `;
  });
}

</script>

</body>
</html>
