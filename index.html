<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>رفع ملفات</title>
</head>
<body>

<h2>رفع ملفات إلى Supabase</h2>

<input type="file" id="file">
<button onclick="uploadFile()">رفع الملف</button>

<div id="list"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

// 🔥 بياناتك (مركبة جاهزة)
const supabaseUrl = "https://mvfydfodqyvfdzzapckf.supabase.co";
const supabaseKey = "psb_publishable_QFwdX1L2pneeEFEqXNpbRw_9vJ71a1e";

const supabase = createClient(supabaseUrl, supabaseKey);

window.uploadFile = async function () {
  const file = document.getElementById("file").files[0];
  if (!file) return alert("اختر ملف أولاً");

  const fileName = Date.now() + "_" + file.name;

  // رفع الملف
  const { data, error } = await supabase
    .storage
    .from("files")
    .upload(fileName, file);

  if (error) {
    alert("فشل الرفع ❌");
    console.log(error);
    return;
  }

  // رابط عام
  const { data: urlData } = supabase
    .storage
    .from("files")
    .getPublicUrl(fileName);

  const link = document.createElement("a");
  link.href = urlData.publicUrl;
  link.target = "_blank";
  link.textContent = "⬇ تحميل: " + file.name;

  document.getElementById("list").appendChild(link);
  document.getElementById("list").appendChild(document.createElement("br"));
};
</script>

</body>
</html>
