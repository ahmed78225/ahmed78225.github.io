<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Ahmed Drive</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* الصفحات */
.page{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active{
  display:flex;
}

/* زر البداية */
.big-btn{
  padding:20px 40px;
  font-size:20px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* القائمة الثلاثية */
.menu{
  position:fixed;
  top:10px;
  right:10px;
  font-size:30px;
  cursor:pointer;
}

/* نافذة جانبية */
.side{
  position:fixed;
  top:0;
  right:-250px;
  width:200px;
  height:100%;
  background:#111827;
  padding:20px;
  transition:0.3s;
}

.side.show{
  right:0;
}

.side button{
  width:100%;
  margin:10px 0;
  padding:10px;
  cursor:pointer;
}

/* تسجيل دخول */
input{
  padding:10px;
  margin:5px;
}

/* رفع */
.card{
  background:white;
  color:black;
  padding:15px;
  margin:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- ☰ -->
<div class="menu" onclick="toggleMenu()">☰</div>

<!-- نافذة جانبية -->
<div class="side" id="side">
  <h3>آدمن فقط</h3>
  <button onclick="show('login')">تسجيل الدخول</button>
  <button onclick="show('upload')">الرفع</button>
</div>

<!-- صفحة 1 -->
<div class="page active" id="home">
  <h1>مرحباً بك في الموقع</h1>
  <button class="big-btn" onclick="show('login')">ابدأ الدخول</button>
</div>

<!-- صفحة 2 تسجيل -->
<div class="page" id="login">
  <h2>تسجيل الدخول</h2>
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">دخول</button>
</div>

<!-- صفحة 3 رفع -->
<div class="page" id="upload">
  <h2>رفع الملفات</h2>
  <input type="file" id="file">
  <input id="desc" placeholder="وصف">
  <button onclick="upload()">رفع</button>

  <div id="list"></div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://mvfydfodqyvfdzzapckf.supabase.co",
  "sb_publishable_QFwdX1L2pneeEFEqXNpbRw_9vJ71a1e"
);

const ADMIN_EMAIL = "ahmed.aa7822@gmail.com";
let user=null;

/* تنقل الصفحات */
window.show = function(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
};

/* القائمة */
window.toggleMenu = function(){
  document.getElementById("side").classList.toggle("show");
};

/* تسجيل */
window.login = async function(){
  let email=document.getElementById("email").value;
  let pass=document.getElementById("pass").value;

  let {data}=await supabase.auth.signInWithPassword({
    email,
    password:pass
  });

  if(data.user){

    user=data.user;

    if(user.email!==ADMIN_EMAIL){
      alert("آدمن فقط");
      await supabase.auth.signOut();
      return;
    }

    show("upload");
  } else {
    alert("خطأ");
  }
};

/* رفع */
window.upload = async function(){
  let file=document.getElementById("file").files[0];
  let desc=document.getElementById("desc").value;

  let name=Date.now()+"_"+file.name;

  await supabase.storage.from("files").upload(name,file);

  await supabase.from("file_meta").insert([{
    name,
    desc,
    owner:user.id
  }]);

  load();
};

/* عرض */
async function load(){
  let {data:files}=await supabase.storage.from("files").list();
  let {data:meta}=await supabase.from("file_meta").select("*");

  let box=document.getElementById("list");
  box.innerHTML="";

  files.forEach(f=>{
    let url=supabase.storage.from("files").getPublicUrl(f.name).data.publicUrl;

    let m=meta?.find(x=>x.name==f.name);

    box.innerHTML+=`
      <div class="card">
        <h3>${f.name}</h3>
        <p>${m?m.desc:""}</p>
        <a href="${url}" download>تحميل</a>
      </div>
    `;
  });
}
</script>

</body>
</html>
