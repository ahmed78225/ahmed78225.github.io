<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>موقعي - رفع الملفات</title>

  <style>
    body{
      margin:0;
      font-family: Arial;
      background:#0b1220;
      color:white;
      text-align:center;
    }

    header{
      padding:20px;
      background:#111a2e;
      font-size:20px;
      font-weight:bold;
    }

    .container{
      padding:20px;
    }

    .upload-box{
      background:#1c2a44;
      padding:20px;
      border-radius:10px;
      margin:20px auto;
      max-width:400px;
    }

    input, button{
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:5px;
    }

    button{
      background:#38bdf8;
      color:black;
      font-weight:bold;
      cursor:pointer;
    }

    .files{
      margin-top:20px;
    }

    .file{
      background:#1c2a44;
      margin:10px auto;
      padding:10px;
      border-radius:8px;
      max-width:400px;
    }

    a{
      color:#38bdf8;
      text-decoration:none;
    }
  </style>
</head>

<body>

<header>
  📁 نظام رفع الملفات
</header>

<div class="container">

  <!-- رفع ملف -->
  <div class="upload-box">
    <h3>رفع ملف</h3>
    <input type="file" id="fileInput">
    <button onclick="uploadFile()">رفع</button>
  </div>

  <!-- عرض الملفات -->
  <div class="files" id="files"></div>

</div>

<script>
const API = "http://85.215.220.246:11081"; 
// 👆 غير هذا بالرابط حق السيرفر عندك

// رفع ملف
async function uploadFile(){
  const fileInput = document.getElementById("fileInput");
  const file = fileInput.files[0];

  if(!file){
    alert("اختر ملف أول");
    return;
  }

  const formData = new FormData();
  formData.append("file", file);

  await fetch(API + "/upload", {
    method: "POST",
    body: formData
  });

  alert("تم الرفع ✅");
  loadFiles();
}

// تحميل الملفات
async function loadFiles(){
  const res = await fetch(API + "/files");
  const data = await res.json();

  const box = document.getElementById("files");
  box.innerHTML = "";

  data.forEach(f=>{
    box.innerHTML += `
      <div class="file">
        📄 ${f.name} <br>
        <a href="${API + f.url}" target="_blank">⬇ تحميل</a>
      </div>
    `;
  });
}

loadFiles();
setInterval(loadFiles, 5000);

</script>

</body>
</html>
